[package]
name = "egomoose/photobooth-plugin"
description = "A plugin for capturing images in Roblox studio."
repository = "https://github.com/EgoMoose/photobooth-plugin"
version = "2.1.1"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
license = "AGPL-3.0"
private = true

[dependencies]
Sift = "csqrl/sift@0.0.11"
Trove = "sleitnick/trove@1.5.1"
Future = "egomoose/future@1.0.0"
Signal = "sleitnick/signal@2.0.3"
Semver = "tim7775/semver@1.0.0"
Parallel = "egomoose/parallel@0.1.0"
CargoSemver = "tim7775/cargo-semver@1.0.20"
GreenTea = "corecii/greentea@0.4.11"

React = "jsdotlua/react@17.2.1"
ReactRoblox = "jsdotlua/react-roblox@17.2.1"
StudioComponents = "sircfenner/studiocomponents@1.2.0"
Lucide = "virtualbutfake/lucide-roblox@1.1.3"
ReactRipple = "littensy/react-ripple@3.0.1"